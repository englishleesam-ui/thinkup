<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkUp 출석관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      max-width: 420px; width: 90%;
    }
    .logo { font-size: 2.8rem; font-weight: 800; color: #2563eb; letter-spacing: -1px; }
    .logo span { color: #1e3a5f; }
    .tagline { color: #64748b; margin: 0.5rem 0 2.5rem; font-size: 1rem; }
    .btn {
      display: block; width: 100%;
      padding: 1.1rem;
      border-radius: 14px;
      font-size: 1.05rem; font-weight: 600;
      text-decoration: none; color: white;
      margin-bottom: 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .btn-teacher { background: #2563eb; }
    .btn-student { background: #059669; }
    .divider { color: #cbd5e1; margin: 1.5rem 0 1rem; font-size: 0.85rem; }
    .admin-link {
      color: #94a3b8; font-size: 0.85rem; text-decoration: none;
      display: inline-block; padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0; border-radius: 8px;
      transition: color 0.15s;
    }
    .admin-link:hover { color: #475569; }
    .install-tip {
      margin-top: 1.5rem; padding: 0.8rem 1rem;
      background: #f0f9ff; border-radius: 10px;
      color: #0369a1; font-size: 0.8rem; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Think<span>Up</span></div>
    <p class="tagline">학원 출석 관리 시스템</p>

    <a href="./teacher/" class="btn btn-teacher">선생님용 앱 열기</a>
    <a href="./student/" class="btn btn-student">학생용 앱 열기 (태블릿)</a>

    <div class="divider">─────────────</div>
    <a href="./admin/" class="admin-link">관리자 로그인</a>

    <div class="install-tip">
      📱 앱 설치: 브라우저 메뉴 → <strong>홈 화면에 추가</strong>를 누르면<br>앱처럼 사용할 수 있습니다.
    </div>
  </div>
</body>
</html>
