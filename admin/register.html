<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 등록 - ThinkUp</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; }

    .topbar {
      background: #1e3a5f; color: white;
      padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .topbar a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }
    .topbar h1 { font-size: 1.1rem; }

    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

    /* 안내 박스 */
    .guide {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 12px; padding: 1rem 1.2rem;
      margin-bottom: 1.5rem; font-size: 0.88rem; color: #1e40af;
      line-height: 1.7;
    }
    .guide strong { display: block; margin-bottom: 0.3rem; font-size: 0.95rem; }

    /* 드래그 영역 */
    .drop-zone {
      background: white; border: 2.5px dashed #93c5fd;
      border-radius: 16px; padding: 3rem 2rem;
      text-align: center; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .drop-zone:hover, .drop-zone.dragover { background: #eff6ff; border-color: #2563eb; }
    .drop-zone.done { border-color: #10b981; background: #f0fdf4; border-style: solid; }
    .drop-zone input { display: none; }
    .dz-icon { font-size: 3rem; margin-bottom: 0.8rem; }
    .dz-title { font-size: 1.05rem; font-weight: 700; color: #1e40af; margin-bottom: 0.3rem; }
    .dz-sub { font-size: 0.85rem; color: #64748b; }
    .drop-zone.done .dz-title { color: #059669; }
    .drop-zone.done .dz-sub { color: #6ee7b7; }

    /* 상태 메시지 */
    .status { padding: 0.9rem 1.2rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .status.loading { background: #fef3c7; color: #92400e; display: block; }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error   { background: #fee2e2; color: #991b1b; display: block; }

    /* 결과 */
    #resultSection { display: none; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .result-header h2 { font-size: 1rem; font-weight: 700; color: #1e293b; }
    .btn-save {
      padding: 0.65rem 1.5rem; border-radius: 9px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      border: none; background: #2563eb; color: white;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #1d4ed8; }
    .btn-save:disabled { background: #93c5fd; cursor: not-allowed; }

    /* 탭 */
    .day-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .tab {
      padding: 0.45rem 1.1rem; border-radius: 20px;
      border: 1.5px solid #e2e8f0; background: white;
      cursor: pointer; font-size: 0.88rem; color: #475569;
      transition: all 0.15s;
    }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; }
    .tab.sat { }
    .tab.sat.active { background: #7c3aed; border-color: #7c3aed; }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    .teacher-block {
      background: white; border-radius: 12px;
      padding: 1.2rem; margin-bottom: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .teacher-name {
      font-weight: 700; color: #1e3a5f; font-size: 0.95rem;
      padding-bottom: 0.6rem; margin-bottom: 0.8rem;
      border-bottom: 1.5px solid #f1f5f9;
      display: flex; justify-content: space-between; align-items: center;
    }
    .teacher-count { color: #94a3b8; font-size: 0.8rem; font-weight: 400; }
    .student-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .chip {
      padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.82rem;
      background: #eff6ff; color: #1e40af;
    }
    .chip .code { color: #93c5fd; font-size: 0.75rem; margin-left: 0.3rem; }
    .empty-panel { color: #94a3b8; text-align: center; padding: 2rem; font-size: 0.88rem; }

    /* 통계 */
    .stats-row {
      display: flex; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap;
    }
    .stat {
      background: white; border-radius: 10px; padding: 0.8rem 1.2rem;
      font-size: 0.85rem; color: #475569;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat strong { color: #2563eb; font-size: 1.1rem; margin-right: 0.3rem; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="./index.html">← 대시보드</a>
  <h1>학생 등록</h1>
</div>

<div class="container">
  <div class="guide">
    <strong>📌 사용 방법</strong>
    코드가 포함된 시간표 파일 (예: <b>출석명단_5월_정리.xlsx</b>) 하나만 올리세요.<br>
    학생 이름 옆에 <b>이름 (4자리코드)</b> 형식이 있으면 자동으로 인식합니다.<br>
    월요일 ~ 토요일 수업을 지원합니다.
  </div>

  <div id="status" class="status"></div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="dz-icon">📊</div>
    <div class="dz-title" id="dzTitle">시간표 파일을 여기에 드래그 하세요</div>
    <div class="dz-sub" id="dzSub">또는 클릭해서 파일 선택 (.xlsx, .xls)</div>
    <input type="file" id="fileInput" accept=".xls,.xlsx">
  </div>

  <div id="resultSection">
    <div class="stats-row" id="statsRow"></div>
    <div class="result-header">
      <h2 id="resultTitle">파싱 결과 확인</h2>
      <button class="btn-save" id="saveBtn" onclick="saveToFirebase()">Firebase에 저장</button>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div id="dayPanels"></div>
  </div>
</div>

<script>
if (!sessionStorage.getItem('thinkup_admin')) window.location.href = './index.html';

const DAYS_KR  = ['월', '화', '수', '목', '금', '토']; // 일 제외
const DAY_CODES = { '월': 'mon', '화': 'tue', '수': 'wed', '목': 'thu', '금': 'fri', '토': 'sat' };
const DAY_LABEL = { mon: '월요일', tue: '화요일', wed: '수요일', thu: '목요일', fri: '금요일', sat: '토요일' };
const DAY_ORDER = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

const STUDENT_RE = /^(.+?)\s*\((\d{4})\)$/;

let parsedSchedule = null;
let parsedStudents = {};  // code -> name

// ── 드래그 앤 드롭 ──
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
  else showStatus('파일을 인식할 수 없습니다.', 'error');
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  showStatus('파일 분석 중...', 'loading');
  dropZone.classList.remove('done');
  try {
    const wb = await readXLS(file);
    const result = parseWorkbook(wb);
    parsedSchedule = result.schedule;
    parsedStudents = result.students;
    renderResult();
    document.getElementById('resultSection').style.display = 'block';
    dropZone.classList.add('done');
    document.getElementById('dzTitle').textContent = '✓ ' + file.name;
    document.getElementById('dzSub').textContent = '파일이 성공적으로 로드되었습니다.';
    showStatus('분석 완료! 내용을 확인한 후 저장하세요.', 'success');
  } catch (err) {
    showStatus('오류: ' + err.message, 'error');
    console.error(err);
  }
}

// ── XLS 읽기 ──
function readXLS(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try { resolve(XLSX.read(e.target.result, { type: 'array' })); }
      catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('파일을 열 수 없습니다.'));
    reader.readAsArrayBuffer(file);
  });
}

// ── 워크북 전체 파싱 ──
function parseWorkbook(wb) {
  // 시트 중 시간표가 있는 시트 자동 탐지 (요일 셀이 2개 이상)
  let bestSheet = null;
  let bestScore = 0;

  for (const name of wb.SheetNames) {
    const sh = wb.Sheets[name];
    const range = XLSX.utils.decode_range(sh['!ref'] || 'A1');
    let score = 0;
    for (let r = range.s.r; r <= Math.min(range.e.r, 10); r++) {
      for (let c = range.s.c; c <= range.e.c; c++) {
        const cell = sh[XLSX.utils.encode_cell({ r, c })];
        if (cell && DAYS_KR.includes(String(cell.v).trim())) score++;
      }
    }
    if (score > bestScore) { bestScore = score; bestSheet = sh; }
  }

  if (!bestSheet || bestScore < 2) throw new Error('시간표 시트를 찾을 수 없습니다. 요일(월/화/수/목/금/토) 셀이 있는지 확인하세요.');

  return parseTimetableSheet(bestSheet);
}

// ── 시트 파싱 ──
function parseTimetableSheet(sheet) {
  const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const maxR = range.e.r + 1;
  const maxC = range.e.c + 1;

  // 그리드 생성
  const grid = Array.from({ length: maxR }, () => Array(maxC).fill(''));
  for (let r = 0; r < maxR; r++) {
    for (let c = 0; c < maxC; c++) {
      const cell = sheet[XLSX.utils.encode_cell({ r, c })];
      if (cell && cell.v !== null && cell.v !== undefined) {
        grid[r][c] = String(cell.v).trim();
      }
    }
  }

  // 병합 셀 처리
  (sheet['!merges'] || []).forEach(m => {
    const val = grid[m.s.r][m.s.c];
    for (let r = m.s.r; r <= m.e.r; r++) {
      for (let c = m.s.c; c <= m.e.c; c++) {
        if (grid[r]) grid[r][c] = val;
      }
    }
  });

  // 요일 헤더 행 탐색 (처음 10행 내에서)
  let dayRowIdx = -1;
  const dayColMap = {}; // col -> dayKr
  for (let r = 0; r < Math.min(grid.length, 10); r++) {
    const dayCount = grid[r].filter(v => DAYS_KR.includes(v)).length;
    if (dayCount >= 2) {
      dayRowIdx = r;
      grid[r].forEach((v, c) => { if (DAYS_KR.includes(v)) dayColMap[c] = v; });
      break;
    }
  }
  if (dayRowIdx === -1) throw new Error('요일 정보를 찾을 수 없습니다.');

  // 각 요일의 컬럼 범위
  const dayEntries = Object.entries(dayColMap)
    .map(([c, d]) => ({ col: Number(c), day: d }))
    .sort((a, b) => a.col - b.col);

  // 일요일 제외
  const filteredEntries = dayEntries.filter(de => de.day !== '일');

  const dayRanges = filteredEntries.map((de, i) => {
    // 다음 요일 시작 전까지 (단, 일요일은 건너뜀)
    let nextCol = maxC;
    for (let j = i + 1; j < dayEntries.length; j++) {
      if (dayEntries[j].day !== '일') { nextCol = dayEntries[j].col; break; }
      // 일요일이면 그 다음 찾기
    }
    return {
      day: de.day,
      dayCode: DAY_CODES[de.day],
      startCol: de.col,
      endCol: nextCol - 1
    };
  });

  // 스케줄 초기화
  const schedule = {};
  dayRanges.forEach(dr => { schedule[dr.dayCode] = { day: dr.day, teachers: [] }; });

  // 선생님 행 (요일 헤더 바로 다음)
  const teacherRow = grid[dayRowIdx + 1] || [];
  teacherRow.forEach((cell, c) => {
    if (!cell || DAYS_KR.includes(cell)) return;
    const dr = dayRanges.find(r => c >= r.startCol && c <= r.endCol);
    if (dr) {
      schedule[dr.dayCode].teachers.push({ name: cell, col: c, students: [] });
    }
  });

  // 학생 이름 파싱 (이름(코드) 형식)
  const students = {}; // code -> name
  const GRADE_RE = /^[초중고]\s*\d+/;

  for (let r = dayRowIdx + 2; r < grid.length; r++) {
    grid[r].forEach((cell, c) => {
      if (!cell) return;
      const m = cell.match(STUDENT_RE);
      const name = m ? m[1].trim() : cell.trim();
      const code = m ? m[2] : null;

      // 학년 라벨, 요일, 숫자만 있는 셀 제외
      if (GRADE_RE.test(name) || DAYS_KR.includes(name) || /^\d+$/.test(name)) return;
      if (name.length < 2) return;

      // 해당 요일 범위 찾기
      const dr = dayRanges.find(dr => c >= dr.startCol && c <= dr.endCol);
      if (!dr) return;

      const teachers = schedule[dr.dayCode].teachers;
      if (!teachers.length) return;

      // 가장 가까운 선생님 컬럼에 배정
      let nearest = teachers[0];
      let minDist = Math.abs(c - nearest.col);
      teachers.forEach(t => {
        const d = Math.abs(c - t.col);
        if (d < minDist) { minDist = d; nearest = t; }
      });

      // 중복 방지
      if (!nearest.students.some(s => s.name === name)) {
        nearest.students.push({ name, code });
        if (code) students[code] = name;
      }
    });
  }

  // col 속성 제거
  Object.values(schedule).forEach(day => {
    day.teachers.forEach(t => delete t.col);
  });

  return { schedule, students };
}

// ── 결과 렌더링 ──
function renderResult() {
  const tabs   = document.getElementById('dayTabs');
  const panels = document.getElementById('dayPanels');
  tabs.innerHTML = ''; panels.innerHTML = '';

  // 통계
  const teacherNames = new Set();
  let studentCount = 0;
  let noCodeCount = 0;
  Object.values(parsedSchedule).forEach(day => {
    day.teachers.forEach(t => {
      teacherNames.add(t.name);
      t.students.forEach(s => {
        studentCount++;
        if (!s.code) noCodeCount++;
      });
    });
  });
  const totalStudents = Object.keys(parsedStudents).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><strong>${teacherNames.size}</strong>명의 선생님</div>
    <div class="stat"><strong>${totalStudents}</strong>명의 학생 (코드 포함)</div>
    ${noCodeCount ? `<div class="stat" style="color:#ef4444"><strong>${noCodeCount}</strong>개 항목 코드 없음</div>` : ''}
  `;
  document.getElementById('resultTitle').textContent = '파싱 결과 확인';

  let first = true;
  DAY_ORDER.forEach(dc => {
    const data = parsedSchedule[dc];
    if (!data) return;
    const hasData = data.teachers.some(t => t.students.length > 0);

    const tab = document.createElement('button');
    tab.className = 'tab' + (dc === 'sat' ? ' sat' : '') + (first ? ' active' : '');
    tab.textContent = DAY_LABEL[dc];
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + dc).classList.add('active');
    };
    tabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'day-panel' + (first ? ' active' : '');
    panel.id = 'panel-' + dc;

    if (!hasData) {
      panel.innerHTML = '<div class="empty-panel">이 요일에 배정된 학생이 없습니다.</div>';
    } else {
      data.teachers.forEach(t => {
        if (!t.students.length) return;
        const block = document.createElement('div');
        block.className = 'teacher-block';
        block.innerHTML = `
          <div class="teacher-name">
            👨‍🏫 ${t.name} 선생님
            <span class="teacher-count">${t.students.length}명</span>
          </div>
          <div class="student-chips">
            ${t.students.map(s => `
              <span class="chip">${s.name}${s.code ? `<span class="code">(${s.code})</span>` : '<span class="code" style="color:#fca5a5">코드없음</span>'}</span>
            `).join('')}
          </div>
        `;
        panel.appendChild(block);
      });
    }
    panels.appendChild(panel);
    first = false;
  });
}

// ── Firebase 저장 ──
async function saveToFirebase() {
  if (!parsedSchedule) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  showStatus('Firebase에 저장 중...', 'loading');
  try {
    const batch = db.batch();

    // 스케줄 저장
    for (const [dayCode, data] of Object.entries(parsedSchedule)) {
      const clean = {
        day: data.day,
        teachers: data.teachers.map(t => ({
          name: t.name,
          students: t.students.filter(s => s.code).map(s => ({ name: s.name, code: s.code }))
        })).filter(t => t.students.length > 0)
      };
      batch.set(db.collection('schedules').doc(dayCode), clean);
    }

    // 학생 개별 저장
    for (const [code, name] of Object.entries(parsedStudents)) {
      batch.set(db.collection('students').doc(code), { name, code });
    }

    await batch.commit();
    const cnt = Object.keys(parsedStudents).length;
    showStatus(`저장 완료! 학생 ${cnt}명, 요일 ${Object.keys(parsedSchedule).length}개 등록되었습니다.`, 'success');
    btn.textContent = '저장 완료 ✓';
  } catch (err) {
    showStatus('저장 실패: ' + err.message, 'error');
    btn.disabled = false; btn.textContent = 'Firebase에 저장';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
