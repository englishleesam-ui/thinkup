<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkUp - 시간표 관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f1f5f9; min-height: 100vh;
    }
    .topbar {
      background: #1e3a5f; color: white;
      padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .topbar a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }
    .topbar h1 { font-size: 1.1rem; flex: 1; }
    .btn-print-top {
      background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      padding: 0.4rem 1rem; font-size: 0.85rem; cursor: pointer; font-weight: 600;
    }
    .btn-print-top:hover { background: rgba(255,255,255,0.25); }

    .main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem 100px; }

    .day-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .day-tab {
      padding: 0.55rem 1.2rem; border-radius: 20px;
      border: 2px solid #e2e8f0; background: white;
      cursor: pointer; font-size: 0.95rem; font-weight: 700;
      color: #64748b; transition: all 0.15s;
    }
    .day-tab.active { background: #2563eb; border-color: #2563eb; color: white; }
    .day-tab:hover:not(.active) { border-color: #2563eb; color: #2563eb; }
    .day-tab .cnt { font-size: 0.72rem; font-weight: 500; opacity: 0.7; margin-left: 3px; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #475569; letter-spacing: 0.03em; }

    .teacher-grid { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; }
    .teacher-chip {
      padding: 0.5rem 1rem; border-radius: 20px;
      background: white; border: 2px solid #e2e8f0;
      cursor: pointer; font-size: 0.9rem; font-weight: 700;
      color: #475569; transition: all 0.15s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .teacher-chip.active { background: #1e3a5f; border-color: #1e3a5f; color: white; }
    .teacher-chip:hover:not(.active) { border-color: #1e3a5f; }
    .chip-del {
      font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,0.12); display: inline-flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
    .teacher-chip.active .chip-del { background: rgba(255,255,255,0.25); }
    .chip-del:hover { background: #ef4444 !important; color: white; }

    .btn-add-outline {
      padding: 0.5rem 1rem; border-radius: 20px;
      background: transparent; border: 2px dashed #93c5fd;
      cursor: pointer; font-size: 0.9rem; color: #2563eb; font-weight: 600;
    }
    .btn-add-outline:hover { background: #eff6ff; }

    .student-panel {
      background: white; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden;
    }
    .student-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem; border-bottom: 1px solid #f1f5f9;
    }
    .student-panel-title { font-size: 1rem; font-weight: 700; color: #1e3a5f; }
    .student-count { font-size: 0.82rem; color: #94a3b8; margin-left: 0.5rem; }

    .student-list { padding: 0.5rem 0.8rem; }
    .student-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.5rem; border-radius: 10px; transition: background 0.1s;
    }
    .student-row:hover { background: #f8fafc; }
    .snum { font-size: 0.78rem; color: #94a3b8; width: 22px; text-align: right; flex-shrink: 0; }

    .sname-wrap { flex: 1; }
    .sname-text {
      font-size: 0.95rem; font-weight: 600; color: #1e293b;
      padding: 0.2rem 0.5rem; border-radius: 6px; cursor: pointer; display: inline-block;
    }
    .sname-text:hover { background: #e2e8f0; }
    .sname-input {
      font-size: 0.95rem; font-weight: 600; color: #1e293b;
      border: 1.5px solid #2563eb; border-radius: 6px;
      padding: 0.2rem 0.5rem; outline: none; width: 120px;
    }

    .grade-badge {
      padding: 0.2rem 0.6rem; border-radius: 12px;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .grade-elem  { background: #dcfce7; color: #15803d; }
    .grade-mid   { background: #dbeafe; color: #1d4ed8; }
    .grade-high  { background: #fce7f3; color: #9d174d; }
    .grade-none  { background: #f1f5f9; color: #94a3b8; }

    .code-badge {
      padding: 0.2rem 0.7rem; border-radius: 12px;
      font-size: 0.8rem; font-weight: 700; flex-shrink: 0; min-width: 60px; text-align: center;
    }
    .code-has { background: #ede9fe; color: #6d28d9; }
    .code-none { background: #f1f5f9; color: #94a3b8; border: 1.5px dashed #cbd5e1; font-size: 0.72rem; }

    .del-student {
      width: 26px; height: 26px; border-radius: 50%;
      background: #fee2e2; color: #ef4444;
      border: none; cursor: pointer; font-size: 0.82rem;
      opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
    }
    .student-row:hover .del-student { opacity: 1; }

    /* Add student row */
    .add-student-row {
      padding: 1rem 1rem; border-top: 1px solid #f1f5f9;
      display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap;
    }
    .add-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .add-field label { font-size: 0.75rem; color: #64748b; font-weight: 600; }
    .add-name-input {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 0.5rem 0.8rem; font-size: 0.9rem; outline: none; width: 130px;
    }
    .add-name-input:focus { border-color: #2563eb; }
    .add-grade-select {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 0.5rem 0.5rem; font-size: 0.85rem; outline: none;
      background: white; cursor: pointer;
    }
    .add-grade-select:focus { border-color: #2563eb; }
    .code-preview {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 0.5rem 0.8rem; font-size: 0.9rem;
      background: #f8fafc; color: #94a3b8; width: 80px; text-align: center;
      font-weight: 700;
    }
    .code-preview.ready { background: #ede9fe; color: #6d28d9; border-color: #c4b5fd; }
    .btn-add-student {
      background: #2563eb; color: white; border: none;
      border-radius: 10px; padding: 0.55rem 1.2rem;
      font-size: 0.9rem; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .btn-add-student:hover { background: #1d4ed8; }

    .empty-state { padding: 2rem; text-align: center; color: #94a3b8; font-size: 0.9rem; }
    .no-teacher-msg {
      background: white; border-radius: 16px; padding: 2.5rem;
      text-align: center; color: #94a3b8; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #e2e8f0;
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .save-status { font-size: 0.85rem; color: #64748b; }
    .btn-save {
      background: #2563eb; color: white; border: none;
      border-radius: 12px; padding: 0.8rem 2.5rem;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { background: #1d4ed8; }
    .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ── Print Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 20px;
      width: 100%; max-width: 680px; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem; border-bottom: 1px solid #f1f5f9;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; color: #1e3a5f; }
    .modal-actions { display: flex; gap: 0.7rem; }
    .btn-modal-print {
      background: #2563eb; color: white; border: none;
      border-radius: 8px; padding: 0.5rem 1.2rem;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-modal-close {
      background: #f1f5f9; color: #475569; border: none;
      border-radius: 8px; padding: 0.5rem 1rem;
      font-size: 0.9rem; cursor: pointer;
    }
    .modal-body { padding: 1.5rem; }
    .grade-section { margin-bottom: 1.5rem; }
    .grade-section-title {
      font-size: 0.85rem; font-weight: 700; color: #64748b;
      letter-spacing: 0.05em; margin-bottom: 0.6rem;
      padding-bottom: 0.4rem; border-bottom: 2px solid #f1f5f9;
    }
    .code-table {
      width: 100%; border-collapse: collapse; font-size: 0.9rem;
    }
    .code-table th {
      text-align: left; padding: 0.4rem 0.6rem;
      background: #f8fafc; color: #64748b; font-size: 0.78rem; font-weight: 700;
    }
    .code-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #f8fafc; }
    .code-table tr:last-child td { border-bottom: none; }
    .code-val { font-weight: 700; color: #6d28d9; font-size: 1rem; }
    .no-code-val { color: #94a3b8; font-size: 0.8rem; }

    /* Print styles */
    @media print {
      body > *:not(.modal-overlay) { display: none !important; }
      .modal-overlay { display: block !important; position: static !important; background: none !important; padding: 0 !important; }
      .modal-box { border-radius: 0 !important; box-shadow: none !important; max-width: none !important; }
      .modal-actions { display: none !important; }
      .modal-header { border-bottom: 2px solid #1e3a5f !important; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="./index.html">← 대시보드</a>
  <h1>시간표 관리</h1>
  <button class="btn-print-top" onclick="openPrintModal()">🖨 코드 출력</button>
</div>

<div class="main">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="section-header">
    <span class="section-title" id="teacherSectionTitle">선생님</span>
  </div>
  <div class="teacher-grid" id="teacherGrid"></div>
  <div id="studentArea"></div>
</div>

<div class="save-bar">
  <span class="save-status" id="saveStatus">데이터 불러오는 중...</span>
  <button class="btn-save" id="saveBtn" onclick="saveAll()">저장</button>
</div>

<!-- Print Modal -->
<div class="modal-overlay" id="printModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>학생 코드 목록</h2>
      <div class="modal-actions">
        <button class="btn-modal-print" onclick="window.print()">🖨 인쇄</button>
        <button class="btn-modal-close" onclick="closePrintModal()">닫기</button>
      </div>
    </div>
    <div class="modal-body" id="printModalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  if (!sessionStorage.getItem('thinkup_admin')) location.href = './index.html';

  const DAYS = [
    {code:'mon', label:'월'}, {code:'tue', label:'화'},
    {code:'wed', label:'수'}, {code:'thu', label:'목'},
    {code:'fri', label:'금'}, {code:'sat', label:'토'},
  ];

  const GRADES = [
    {key:'초3', label:'초등 3학년', prefix:3, cls:'grade-elem'},
    {key:'초4', label:'초등 4학년', prefix:4, cls:'grade-elem'},
    {key:'초5', label:'초등 5학년', prefix:5, cls:'grade-elem'},
    {key:'초6', label:'초등 6학년', prefix:6, cls:'grade-elem'},
    {key:'중1', label:'중학교 1학년', prefix:7, cls:'grade-mid'},
    {key:'중2', label:'중학교 2학년', prefix:8, cls:'grade-mid'},
    {key:'중3', label:'중학교 3학년', prefix:9, cls:'grade-mid'},
    {key:'고1', label:'고등 1학년', prefix:1, cls:'grade-high'},
    {key:'고2', label:'고등 2학년', prefix:2, cls:'grade-high'},
    {key:'고3', label:'고등 3학년', prefix:3, cls:'grade-high'},
  ];

  let schedule = {};
  let currentDay = 'mon';
  let currentTeacherIdx = null;
  let hasChanges = false;

  DAYS.forEach(d => { schedule[d.code] = { day: d.label, teachers: [] }; });

  // ── Helpers ────────────────────────────────────────────────

  function gradeInfo(key) {
    return GRADES.find(g => g.key === key) || null;
  }

  function gradeCls(key) {
    const g = gradeInfo(key);
    return g ? g.cls : 'grade-none';
  }

  /** Collect all used codes across ALL days */
  function usedCodesSet() {
    const s = new Set();
    for (const d of DAYS) {
      for (const t of (schedule[d.code]?.teachers || [])) {
        for (const st of (t.students || [])) {
          if (st.code) s.add(st.code);
        }
      }
    }
    return s;
  }

  /** Get next available code for a grade key */
  function nextCode(gradeKey) {
    const g = gradeInfo(gradeKey);
    if (!g) return '';
    const used = usedCodesSet();
    const start = g.prefix * 1000 + 1;
    const end   = g.prefix * 1000 + 999;
    for (let i = start; i <= end; i++) {
      if (!used.has(String(i))) return String(i);
    }
    return '';
  }

  function setStatus(msg, color) {
    const el = document.getElementById('saveStatus');
    el.textContent = msg;
    el.style.color = color || '#64748b';
  }

  function markChanged() {
    hasChanges = true;
    setStatus('저장하지 않은 변경사항이 있습니다', '#f59e0b');
  }

  // ── Load ───────────────────────────────────────────────────

  async function loadSchedule() {
    try {
      for (const d of DAYS) {
        const doc = await db.collection('schedules').doc(d.code).get();
        if (doc.exists) {
          const data = doc.data();
          if (!data.teachers) data.teachers = [];
          schedule[d.code] = data;
        }
      }
      setStatus('최신 데이터 로드 완료', '#10b981');
    } catch(e) {
      setStatus('로드 오류: ' + e.message, '#ef4444');
    }
    renderAll();
  }

  // ── Render ─────────────────────────────────────────────────

  function renderAll() { renderDayTabs(); renderTeachers(); }

  function renderDayTabs() {
    document.getElementById('dayTabs').innerHTML = DAYS.map(d => {
      const cnt = (schedule[d.code]?.teachers || []).length;
      return `<button class="day-tab ${d.code === currentDay ? 'active' : ''}" onclick="selectDay('${d.code}')">
        ${d.label}요일<span class="cnt">${cnt ? cnt+'명' : ''}</span>
      </button>`;
    }).join('');
  }

  function selectDay(code) {
    currentDay = code;
    currentTeacherIdx = null;
    renderAll();
  }

  function renderTeachers() {
    const teachers = schedule[currentDay]?.teachers || [];
    const dayLabel = DAYS.find(d => d.code === currentDay).label;
    document.getElementById('teacherSectionTitle').textContent = `${dayLabel}요일 선생님`;

    document.getElementById('teacherGrid').innerHTML =
      teachers.map((t, i) => `
        <div class="teacher-chip ${currentTeacherIdx === i ? 'active' : ''}" onclick="selectTeacher(${i})">
          ${t.name}
          <span class="chip-del" onclick="event.stopPropagation();deleteTeacher(${i})" title="삭제">✕</span>
        </div>
      `).join('') +
      `<button class="btn-add-outline" onclick="addTeacher()">+ 선생님 추가</button>`;

    renderStudentPanel();
  }

  function selectTeacher(idx) { currentTeacherIdx = idx; renderTeachers(); }

  function renderStudentPanel() {
    const area = document.getElementById('studentArea');
    if (currentTeacherIdx === null) {
      area.innerHTML = `<div class="no-teacher-msg">위에서 선생님을 선택하면 학생 목록을 관리할 수 있습니다</div>`;
      return;
    }
    const teacher = schedule[currentDay].teachers[currentTeacherIdx];
    if (!teacher) return;
    const dayLabel = DAYS.find(d => d.code === currentDay).label;

    const rows = teacher.students.length === 0
      ? `<div class="empty-state">학생이 없습니다. 아래에서 추가하세요.</div>`
      : teacher.students.map((s, i) => {
          const g = gradeInfo(s.grade);
          return `
            <div class="student-row">
              <span class="snum">${i+1}</span>
              <div class="sname-wrap">
                <span class="sname-text" ondblclick="editName(${i})" title="더블클릭으로 이름 수정" id="sname_${i}">${s.name}</span>
              </div>
              <span class="grade-badge ${gradeCls(s.grade)}">${s.grade || '학년?'}</span>
              <span class="code-badge ${s.code ? 'code-has' : 'code-none'}">${s.code || '코드없음'}</span>
              <button class="del-student" onclick="deleteStudent(${i})" title="삭제">✕</button>
            </div>`;
        }).join('');

    const gradeOptions = GRADES.map(g =>
      `<option value="${g.key}">${g.label}</option>`
    ).join('');

    area.innerHTML = `
      <div class="student-panel">
        <div class="student-panel-header">
          <div>
            <span class="student-panel-title">${dayLabel}요일 · ${teacher.name} 선생님</span>
            <span class="student-count">${teacher.students.length}명</span>
          </div>
        </div>
        <div class="student-list">${rows}</div>
        <div class="add-student-row">
          <div class="add-field">
            <label>학생 이름</label>
            <input class="add-name-input" id="addNameInput" placeholder="이름 입력"
              onkeydown="if(event.key==='Enter')document.getElementById('addGradeSelect').focus()">
          </div>
          <div class="add-field">
            <label>학년</label>
            <select class="add-grade-select" id="addGradeSelect" onchange="previewCode()">
              <option value="">학년 선택</option>
              ${gradeOptions}
            </select>
          </div>
          <div class="add-field">
            <label>부여 코드</label>
            <div class="code-preview" id="codePreview">—</div>
          </div>
          <button class="btn-add-student" onclick="confirmAddStudent()">+ 추가</button>
        </div>
      </div>`;
  }

  function previewCode() {
    const grade = document.getElementById('addGradeSelect').value;
    const prev = document.getElementById('codePreview');
    if (!grade) { prev.textContent = '—'; prev.classList.remove('ready'); return; }
    const code = nextCode(grade);
    if (code) {
      prev.textContent = code;
      prev.classList.add('ready');
    } else {
      prev.textContent = '포화';
      prev.classList.remove('ready');
    }
  }

  // ── Actions ────────────────────────────────────────────────

  function addTeacher() {
    const name = prompt('선생님 이름을 입력하세요:');
    if (!name || !name.trim()) return;
    schedule[currentDay].teachers.push({ name: name.trim(), students: [] });
    currentTeacherIdx = schedule[currentDay].teachers.length - 1;
    markChanged();
    renderAll();
  }

  function deleteTeacher(idx) {
    const t = schedule[currentDay].teachers[idx];
    if (!confirm(`"${t.name}" 선생님을 삭제할까요? 학생 ${t.students.length}명도 함께 삭제됩니다.`)) return;
    schedule[currentDay].teachers.splice(idx, 1);
    if (currentTeacherIdx === idx) currentTeacherIdx = null;
    else if (currentTeacherIdx > idx) currentTeacherIdx--;
    markChanged();
    renderAll();
  }

  function confirmAddStudent() {
    const nameEl = document.getElementById('addNameInput');
    const gradeEl = document.getElementById('addGradeSelect');
    const name = nameEl.value.trim();
    const grade = gradeEl.value;
    if (!name) { nameEl.focus(); return; }
    if (!grade) { gradeEl.focus(); return; }

    const code = nextCode(grade);
    if (!code) { alert('해당 학년 코드가 모두 소진되었습니다.'); return; }

    schedule[currentDay].teachers[currentTeacherIdx].students.push({ name, grade, code });
    nameEl.value = '';
    gradeEl.value = '';
    document.getElementById('codePreview').textContent = '—';
    document.getElementById('codePreview').classList.remove('ready');
    nameEl.focus();
    markChanged();
    renderStudentPanel();
    renderTeachers();
  }

  function deleteStudent(idx) {
    schedule[currentDay].teachers[currentTeacherIdx].students.splice(idx, 1);
    markChanged();
    renderStudentPanel();
    renderTeachers();
  }

  function editName(idx) {
    const s = schedule[currentDay].teachers[currentTeacherIdx].students[idx];
    const el = document.getElementById('sname_' + idx);
    el.outerHTML = `<input class="sname-input" id="sname_${idx}" type="text" value="${s.name}"
      onblur="saveName(${idx},this.value)"
      onkeydown="if(event.key==='Enter')this.blur()" autofocus>`;
    setTimeout(() => { const i = document.getElementById('sname_'+idx); if(i){i.focus();i.select();} }, 0);
  }

  function saveName(idx, value) {
    if (value.trim()) {
      schedule[currentDay].teachers[currentTeacherIdx].students[idx].name = value.trim();
      markChanged();
    }
    renderStudentPanel();
  }

  // ── Save ───────────────────────────────────────────────────

  async function saveAll() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = '저장 중...'; btn.disabled = true;
    try {
      const batch = db.batch();
      for (const d of DAYS) {
        batch.set(db.collection('schedules').doc(d.code), schedule[d.code]);
      }
      // Save /students/{code}
      const allStudents = {};
      for (const d of DAYS) {
        for (const t of (schedule[d.code]?.teachers || [])) {
          for (const s of (t.students || [])) {
            if (s.code) allStudents[s.code] = { name: s.name, code: s.code, grade: s.grade || '' };
          }
        }
      }
      for (const [code, student] of Object.entries(allStudents)) {
        batch.set(db.collection('students').doc(code), student);
      }
      await batch.commit();
      hasChanges = false;
      setStatus(`✓ 저장 완료 — 코드 등록 학생 ${Object.keys(allStudents).length}명`, '#10b981');
      renderDayTabs();
    } catch(e) {
      setStatus('저장 오류: ' + e.message, '#ef4444');
    }
    btn.textContent = '저장'; btn.disabled = false;
  }

  // ── Print Modal ────────────────────────────────────────────

  function openPrintModal() {
    // Collect all unique students (by code), ungrouped then group by grade
    const byGrade = {};
    const noCode = [];

    for (const d of DAYS) {
      for (const t of (schedule[d.code]?.teachers || [])) {
        for (const s of (t.students || [])) {
          if (!s.code) { noCode.push(s); continue; }
          if (!byGrade[s.grade]) byGrade[s.grade] = {};
          byGrade[s.grade][s.code] = s; // deduplicate by code
        }
      }
    }

    let html = '';
    const gradeOrder = GRADES.map(g => g.key);
    for (const gKey of gradeOrder) {
      if (!byGrade[gKey]) continue;
      const g = gradeInfo(gKey);
      const students = Object.values(byGrade[gKey]).sort((a,b) => a.code.localeCompare(b.code));
      html += `<div class="grade-section">
        <div class="grade-section-title">${g.label}</div>
        <table class="code-table">
          <thead><tr><th>번호</th><th>이름</th><th>코드</th></tr></thead>
          <tbody>${students.map((s,i) =>
            `<tr><td>${i+1}</td><td>${s.name}</td><td class="code-val">${s.code}</td></tr>`
          ).join('')}</tbody>
        </table>
      </div>`;
    }

    if (noCode.length > 0) {
      html += `<div class="grade-section">
        <div class="grade-section-title">코드 미부여</div>
        <table class="code-table">
          <thead><tr><th>번호</th><th>이름</th><th>코드</th></tr></thead>
          <tbody>${noCode.map((s,i) =>
            `<tr><td>${i+1}</td><td>${s.name}</td><td class="no-code-val">미부여</td></tr>`
          ).join('')}</tbody>
        </table>
      </div>`;
    }

    if (!html) html = `<div class="empty-state">등록된 학생이 없습니다.</div>`;

    document.getElementById('printModalBody').innerHTML = html;
    document.getElementById('printModal').classList.add('open');
  }

  function closePrintModal() {
    document.getElementById('printModal').classList.remove('open');
  }

  document.getElementById('printModal').addEventListener('click', e => {
    if (e.target === document.getElementById('printModal')) closePrintModal();
  });

  // ── Init ───────────────────────────────────────────────────
  loadSchedule();
</script>
</body>
</html>
