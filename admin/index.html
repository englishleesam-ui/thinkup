<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkUp 관리자</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f1f5f9; min-height: 100vh;
    }
    /* 로그인 */
    #loginPage {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: white; border-radius: 20px;
      padding: 2.5rem 2rem; width: 340px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-card h2 { font-size: 1.6rem; color: #1e3a5f; margin-bottom: 0.3rem; }
    .login-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 0.4rem; }
    .form-group input {
      width: 100%; padding: 0.8rem 1rem;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #2563eb; }
    .btn-login {
      width: 100%; padding: 0.9rem;
      background: #2563eb; color: white;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 0.8rem; display: none; }
    /* 대시보드 */
    #dashboard { display: none; }
    .topbar {
      background: #1e3a5f; color: white;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 1.2rem; }
    .btn-logout {
      background: rgba(255,255,255,0.15); color: white;
      border: none; border-radius: 8px;
      padding: 0.4rem 1rem; cursor: pointer; font-size: 0.9rem;
    }
    .dashboard-body {
      max-width: 600px; margin: 3rem auto; padding: 0 1rem;
    }
    .dash-greeting { font-size: 1.1rem; color: #475569; margin-bottom: 2rem; }
    .dash-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .card-purple .dash-icon { background: #f5f3ff; border-radius: 12px; display: inline-block; padding: 0.5rem; }
    .dash-card {
      background: white; border-radius: 16px;
      padding: 2rem 1.5rem; text-align: center;
      text-decoration: none; color: #1e293b;
      box-shadow: 0 4px 15px rgba(0,0,0,0.07);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .dash-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    .dash-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .dash-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .dash-card p { font-size: 0.82rem; color: #94a3b8; }
    .card-blue .dash-icon { background: #eff6ff; border-radius: 12px; display: inline-block; padding: 0.5rem; }
    .card-green .dash-icon { background: #f0fdf4; border-radius: 12px; display: inline-block; padding: 0.5rem; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginPage">
  <div class="login-card">
    <h2>ThinkUp</h2>
    <p>관리자 로그인</p>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="username" placeholder="아이디를 입력하세요" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">로그인</button>
    <p class="error-msg" id="errorMsg">아이디 또는 비밀번호가 틀렸습니다.</p>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="topbar">
    <h1>ThinkUp 관리자</h1>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
  <div class="dashboard-body">
    <p class="dash-greeting" id="greeting"></p>
    <div class="dash-cards">
      <a href="./timetable.html" class="dash-card card-purple">
        <div class="dash-icon">🗓️</div>
        <h3>시간표 관리</h3>
        <p>선생님·학생·코드 직접 편집</p>
      </a>
      <a href="./data.html" class="dash-card card-green">
        <div class="dash-icon">📊</div>
        <h3>수업 데이터</h3>
        <p>입퇴실 기록 조회</p>
      </a>
      <a href="./register.html" class="dash-card card-blue" style="grid-column: span 2;">
        <div class="dash-icon">📋</div>
        <h3>엑셀 가져오기</h3>
        <p>기존 출석명단 XLS 파일로 일괄 등록 (선택)</p>
      </a>
    </div>
  </div>
</div>

<script>
  function login() {
    const id = document.getElementById('username').value;
    const pw = document.getElementById('password').value;
    if (id === 'chris' && pw === '0914') {
      sessionStorage.setItem('thinkup_admin', '1');
      showDashboard();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('thinkup_admin');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const now = new Date();
    const dayStr = days[now.getDay()];
    document.getElementById('greeting').textContent =
      `오늘은 ${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${dayStr}요일)입니다.`;
  }

  if (sessionStorage.getItem('thinkup_admin')) showDashboard();
</script>
</body>
</html>
