<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ThinkUp 출석</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    /* 메인 화면 */
    #mainScreen {
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(160deg, #065f46 0%, #059669 50%, #34d399 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: min(6vh, 2.4rem) 1.5rem 1rem;
      position: relative;
    }

    .welcome {
      color: white; font-size: 1.4rem; font-weight: 600;
      margin-bottom: 0.55rem; text-align: center;
    }
    .welcome-sub { color: rgba(255,255,255,0.75); font-size: 1rem; margin-bottom: 0.9rem; text-align: center; }

    /* 코드 입력 디스플레이 */
    .code-display {
      background: rgba(255,255,255,0.2);
      border-radius: 14px; padding: 0.65rem 0.85rem;
      min-width: 150px;
      display: flex; align-items: center; justify-content: center; gap: 0.8rem;
      position: absolute; top: 0.9rem; left: 0.9rem;
    }
    .code-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.65);
      background: transparent; transition: background 0.15s;
    }
    .code-dot.filled { background: white; border-color: white; }

    /* 키패드 */
    .keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem; width: 100%; max-width: min(320px, 82vh);
    }
    .key {
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 14px;
      color: white; font-size: 1.5rem; font-weight: 600;
      padding: 1.1rem; cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      backdrop-filter: blur(4px);
      aspect-ratio: 1;
    }
    .key:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
    .key.del { font-size: 1.2rem; }
    .key.time-check {
      font-size: 0.9rem; line-height: 1.2; font-weight: 800;
      background: white; color: #047857;
    }
    .key.time-check:active { background: #ecfdf5; }
    .key.empty { background: transparent; cursor: default; }
    .key.empty:active { transform: none; }

    /* 이름 확인 화면 */
    #confirmScreen {
      display: none; height: 100vh;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 2rem 1.5rem;
      text-align: center;
      background: linear-gradient(160deg, #064e3b 0%, #047857 100%);
    }
    #confirmScreen.checkout {
      background: linear-gradient(160deg, #1e3a5f 0%, #2563eb 100%);
    }
    .confirm-label {
      color: rgba(255,255,255,0.75);
      font-size: 1rem; font-weight: 700; margin-bottom: 0.8rem;
    }
    .confirm-name {
      color: white; font-size: 2.4rem; font-weight: 800;
      margin-bottom: 0.8rem;
    }
    .confirm-question {
      color: white; font-size: 1.35rem; font-weight: 700;
      line-height: 1.6;
    }
    .confirm-actions {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem; width: 100%; max-width: 360px;
      margin-top: 2.2rem;
    }
    .confirm-btn {
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 16px; padding: 1.25rem 0.75rem;
      font-size: 1.35rem; font-weight: 800; cursor: pointer;
    }
    .confirm-btn.yes { background: white; color: #047857; }
    #confirmScreen.checkout .confirm-btn.yes { color: #1d4ed8; }
    .confirm-btn.no { background: transparent; color: white; }
    .confirm-btn:active { transform: scale(0.97); }

    /* 메시지 화면 */
    #msgScreen {
      display: none; height: 100vh;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 2rem;
      text-align: center;
    }
    #msgScreen.checkin {
      background: linear-gradient(160deg, #065f46 0%, #059669 100%);
    }
    #msgScreen.checkout {
      background: linear-gradient(160deg, #1e3a5f 0%, #2563eb 100%);
    }
    #msgScreen.checkout-short {
      background: linear-gradient(160deg, #7f1d1d 0%, #dc2626 100%);
    }
    #msgScreen.error {
      background: linear-gradient(160deg, #7f1d1d 0%, #dc2626 100%);
    }

    .msg-icon { font-size: 5rem; margin-bottom: 1.5rem; }
    .msg-text {
      color: white; font-size: 1.35rem; font-weight: 700;
      line-height: 1.7; max-width: 380px;
    }
    .msg-highlight {
      display: none;
      margin-top: 0.9rem;
      color: #ff1f1f;
      background: rgba(255,255,255,0.92);
      border: 4px solid rgba(255,255,255,0.75);
      border-radius: 18px;
      padding: 0.75rem 1.35rem;
      font-size: 3.2rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0;
      box-shadow: 0 14px 34px rgba(0,0,0,0.25);
    }
    .msg-sub {
      color: rgba(255,255,255,0.8); font-size: 1rem;
      margin-top: 1rem; font-weight: 400;
    }
    .msg-timer {
      margin-top: 2rem; color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
    }
    .timer-bar {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px; margin: 0.6rem auto 0; overflow: hidden;
    }
    .timer-fill {
      height: 100%; background: white; border-radius: 2px;
      width: 100%; transition: width linear;
    }

    @media (min-width: 500px) {
      .welcome { font-size: 1.8rem; }
      .key { font-size: 1.8rem; padding: 1.3rem; }
      .keypad { max-width: 360px; }
      .msg-text { font-size: 1.6rem; }
      .msg-highlight { font-size: 4rem; }
    }
    @media (max-height: 620px) {
      #mainScreen { padding-top: 0.45rem; padding-bottom: 0.25rem; }
      .welcome { font-size: 1.12rem; margin-bottom: 0.15rem; }
      .welcome-sub { font-size: 0.82rem; margin-bottom: 0.45rem; }
      .code-display { top: 0.45rem; left: 0.45rem; padding: 0.45rem 0.65rem; min-width: 120px; gap: 0.55rem; border-radius: 12px; }
      .code-dot { width: 18px; height: 18px; }
      .keypad { gap: 0.34rem; max-width: min(300px, 68vh); }
      .key { padding: 0.45rem; border-radius: 10px; font-size: 1.18rem; }
      .key.time-check { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<!-- 메인 화면 (코드 입력) -->
<div id="mainScreen">
  <div class="code-display" id="codeDisplay">
    <div class="code-dot" id="d0"></div>
    <div class="code-dot" id="d1"></div>
    <div class="code-dot" id="d2"></div>
    <div class="code-dot" id="d3"></div>
  </div>

  <div class="welcome">이샘 학원은 여러분을 환영합니다!</div>
  <div class="welcome-sub" id="welcomeSub">코드를 눌러주세요</div>

  <div class="keypad">
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>
    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>
    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>
    <button class="key time-check" onclick="startTimeCheck()">시간<br>체크</button>
    <button class="key" onclick="press('0')">0</button>
    <button class="key del" onclick="del()">←</button>
  </div>
</div>

<!-- 메시지 화면 -->
<div id="msgScreen">
  <div class="msg-icon" id="msgIcon"></div>
  <div class="msg-text" id="msgText"></div>
  <div class="msg-highlight" id="msgHighlight"></div>
  <div class="msg-sub" id="msgSub"></div>
  <div class="msg-timer">
    <div id="timerTxt">5초 후 자동으로 돌아갑니다</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  </div>
</div>

<!-- 학생 이름 확인 화면 -->
<div id="confirmScreen">
  <div class="confirm-label" id="confirmLabel"></div>
  <div class="confirm-name" id="confirmName"></div>
  <div class="confirm-question" id="confirmQuestion"></div>
  <div class="confirm-actions">
    <button class="confirm-btn yes" onclick="confirmAttendance()">Y 맞아요</button>
    <button class="confirm-btn no" onclick="cancelAttendance()">N 아니에요</button>
  </div>
</div>

<script>
let code = '';
let processing = false;
let resetTimer = null;
let pendingAttendance = null;
let timeCheckMode = false;

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function formatTime(d) {
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function formatDuration(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return `${m}분`;
  if (m === 0) return `${h}시간`;
  return `${h}시간 ${m}분`;
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < code.length);
  }
}

function startTimeCheck() {
  if (processing) return;
  code = '';
  timeCheckMode = true;
  updateDots();
  document.getElementById('welcomeSub').textContent = '시간 체크할 코드를 눌러주세요';
}

function press(n) {
  if (processing || code.length >= 4) return;
  code += n;
  updateDots();
  if (code.length === 4) {
    setTimeout(() => submitCode(), 200);
  }
}

function del() {
  if (processing || code.length === 0) return;
  code = code.slice(0, -1);
  updateDots();
}

function getActiveSessions(att) {
  if (!att) return [];
  if (att.sessions && att.sessions.length > 0) return att.sessions;
  if (!att.checkIn) return [];
  return [{ checkIn: att.checkIn, checkOut: att.checkOut || null, durationMinutes: att.durationMinutes || null }];
}

function getCompletedSessionMinutes(sessions) {
  return sessions.reduce((sum, session) => sum + (Number.isFinite(session.durationMinutes) ? session.durationMinutes : 0), 0);
}

async function submitCode() {
  processing = true;
  const enteredCode = code;

  try {
    // 학생 조회
    const studentDoc = await db.collection('students').doc(enteredCode).get();
    if (!studentDoc.exists) {
      showMessage('❓', '등록되지 않은 코드입니다.', '', 'error');
      return;
    }

    const student = studentDoc.data();
    const today = toDateStr(new Date());
    const attendRef = db.collection('attendance').doc(today).collection('students').doc(enteredCode);
    const attendDoc = await attendRef.get();

    if (timeCheckMode) {
      showStudyTime(student, attendDoc.exists ? attendDoc.data() : null);
      return;
    }

    const sessions = getActiveSessions(attendDoc.exists ? attendDoc.data() : null);
    const lastSession = sessions[sessions.length - 1];
    if (!lastSession || lastSession.checkOut) {
      showConfirmation(student, enteredCode, today, attendRef, 'checkin');
    } else {
      showConfirmation(student, enteredCode, today, attendRef, 'checkout');
    }
  } catch (err) {
    showMessage('⚠️', '오류가 발생했습니다.', err.message, 'error');
  }
}

function minutesFromCheckIn(checkIn, now) {
  if (!checkIn) return 0;
  const [hour, minute] = checkIn.split(':').map(v => parseInt(v, 10));
  if (!Number.isFinite(hour) || !Number.isFinite(minute)) return 0;
  const checkInDate = new Date(now);
  checkInDate.setHours(hour, minute, 0, 0);
  return Math.max(0, Math.round((now - checkInDate) / 60000));
}

function getCurrentStudyMinutes(att) {
  const sessions = getActiveSessions(att);
  if (!sessions.length) return { minutes: 0, status: 'none' };
  const now = new Date();
  const total = sessions.reduce((sum, session, index) => {
    if (session.durationMinutes != null) return sum + session.durationMinutes;
    if (index === sessions.length - 1 && !session.checkOut) return sum + minutesFromCheckIn(session.checkIn, now);
    return sum;
  }, 0);
  const lastSession = sessions[sessions.length - 1];
  return { minutes: total, status: lastSession && !lastSession.checkOut ? 'studying' : 'done' };
}

function showStudyTime(student, att) {
  const result = getCurrentStudyMinutes(att);
  if (result.status === 'none') {
    showMessage('ℹ️', `${student.name} 학생`, '오늘 입실 기록이 아직 없습니다.', 'error');
    return;
  }
  showMessage(
    result.status === 'studying' ? '⏱️' : '✅',
    `${student.name} 학생`,
    result.status === 'studying' ? '현재까지 공부한 시간입니다.' : '오늘 기록된 학습 시간입니다.',
    result.status === 'studying' ? 'checkin' : 'checkout',
    formatDuration(result.minutes)
  );
}

function showConfirmation(student, enteredCode, today, attendRef, action) {
  pendingAttendance = { student, enteredCode, today, attendRef, action };
  const confirm = document.getElementById('confirmScreen');
  document.getElementById('mainScreen').style.display = 'none';
  confirm.style.display = 'flex';
  confirm.className = action === 'checkout' ? 'checkout' : '';
  document.getElementById('confirmLabel').textContent =
    action === 'checkout' ? '퇴실 확인' : '입실 확인';
  document.getElementById('confirmName').textContent = `${student.name} 학생`;
  document.getElementById('confirmQuestion').textContent =
    action === 'checkout' ? '퇴실하시겠습니까?' : '입실하시겠습니까?';
}

async function confirmAttendance() {
  if (!pendingAttendance) return;
  const pending = pendingAttendance;
  pendingAttendance = null;

  try {
    const now = new Date();
    const timeStr = formatTime(now);
    const latestDoc = await pending.attendRef.get();
    const latest = latestDoc.exists ? latestDoc.data() : null;

    const sessions = getActiveSessions(latest);

    if (pending.action === 'checkin') {
      const lastSession = sessions[sessions.length - 1];
      if (lastSession && !lastSession.checkOut) {
        showMessage('ℹ️', '출석 상태가 변경되었습니다.', '코드를 다시 입력해주세요.', 'error');
        return;
      }
      const completedMinutes = getCompletedSessionMinutes(sessions);
      const newSession = { checkIn: timeStr, checkOut: null, durationMinutes: null };
      const newSessions = [...sessions, newSession];
      if (!latest) {
        await pending.attendRef.set({
          studentName: pending.student.name,
          code: pending.enteredCode,
          checkIn: timeStr,
          checkInTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
          checkOut: null,
          durationMinutes: null,
          date: pending.today,
          sessions: newSessions
        });
      } else {
        await pending.attendRef.update({
          sessions: newSessions,
          checkOut: null,
          durationMinutes: completedMinutes
        });
      }
      showMessage(
        '✅',
        completedMinutes ? `${pending.student.name} 학생 다시 입실 완료` : `${pending.student.name} 학생 입실 완료`,
        completedMinutes ? `이전 공부시간 ${formatDuration(completedMinutes)}에 이어서 합산됩니다.` : '',
        'checkin',
        timeStr
      );
      return;
    }

    const lastSession = sessions[sessions.length - 1];
    if (!lastSession || lastSession.checkOut) {
      showMessage('ℹ️', '출석 상태가 변경되었습니다.', '코드를 다시 입력해주세요.', 'error');
      return;
    }

    const checkInParts = lastSession.checkIn.split(':');
    const checkInDate = new Date();
    checkInDate.setHours(parseInt(checkInParts[0]), parseInt(checkInParts[1]), 0, 0);
    const sessionMinutes = Math.max(0, Math.round((now - checkInDate) / 60000));
    const updatedSessions = sessions.map((s, i) =>
      i === sessions.length - 1 ? { ...s, checkOut: timeStr, durationMinutes: sessionMinutes } : s
    );
    const totalMinutes = getCompletedSessionMinutes(updatedSessions);
    const durStr = formatDuration(totalMinutes);
    const completedSessionCount = updatedSessions.filter(s => s.checkOut).length;
    await pending.attendRef.update({
      sessions: updatedSessions,
      checkOut: timeStr,
      checkOutTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
      durationMinutes: totalMinutes
    });
    const isShort = totalMinutes < 90;
    showMessage(
      isShort ? '⚠️' : '👋',
      isShort ? `아직 공부량이 부족합니다.` : `${pending.student.name} 학생, 수고하셨습니다!`,
      isShort
        ? `오늘 총 ${durStr}입니다. 다시 입실하면 이어서 합산됩니다.`
        : (completedSessionCount > 1 ? `중간 외출 전 공부시간까지 합산한 오늘 총 공부시간입니다.` : `오늘 총 공부시간입니다.`),
      isShort ? 'checkout-short' : 'checkout',
      durStr
    );
  } catch (err) {
    showMessage('⚠️', '오류가 발생했습니다.', err.message, 'error');
  }
}

function cancelAttendance() {
  pendingAttendance = null;
  resetScreen();
}

function showMessage(icon, text, sub, type, highlight = '') {
  const msg = document.getElementById('msgScreen');
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('confirmScreen').style.display = 'none';
  msg.style.display = 'flex';
  msg.className = type;
  document.getElementById('msgIcon').textContent = icon;
  document.getElementById('msgText').textContent = text;
  const highlightEl = document.getElementById('msgHighlight');
  highlightEl.textContent = highlight;
  highlightEl.style.display = highlight ? 'block' : 'none';
  document.getElementById('msgSub').textContent = sub;

  // 타이머 바 애니메이션
  const fill = document.getElementById('timerFill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  setTimeout(() => {
    fill.style.transition = 'width 5s linear';
    fill.style.width = '0%';
  }, 50);

  if (resetTimer) clearTimeout(resetTimer);
  resetTimer = setTimeout(resetScreen, 5000);
}

function resetScreen() {
  code = '';
  processing = false;
  pendingAttendance = null;
  timeCheckMode = false;
  updateDots();
  document.getElementById('welcomeSub').textContent = '코드를 눌러주세요';
  document.getElementById('msgScreen').style.display = 'none';
  document.getElementById('confirmScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'flex';
}

// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}
</script>
</body>
</html>
