<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#123c69">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<title>ThinkUp 영어 수업</title><link rel="manifest" href="./manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script><script src="../firebase-config.js"></script>
<style>
:root{--navy:#123c69;--ink:#172338;--muted:#68778a;--paper:#f4f7f9;--line:#d9e2ec;--orange:#d9542b;--blue:#176b87;--green:#42642c;--gold:#e0a817;--danger:#b42318}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;margin:0;overflow:hidden;font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink)}button{font:inherit;cursor:pointer}.screen{display:none;min-height:100vh;min-height:100dvh;padding:24px}.screen.active{display:flex}.brand{font-size:24px;font-weight:950}.clock{font-weight:800}.eyebrow{margin:0 0 7px;color:#ef7445;font-size:13px;font-weight:950;letter-spacing:1.5px}.title{margin:0;font-size:clamp(34px,6vw,62px);line-height:1.08}.copy{margin:9px 0 0;color:var(--muted);font-size:clamp(18px,3vw,26px);font-weight:800;line-height:1.45}
#entryScreen{flex-direction:column;justify-content:center;background:linear-gradient(145deg,#e8f0f6,#f9fbfc)}.topline{position:absolute;top:22px;left:24px;right:24px;display:flex;justify-content:space-between;color:var(--navy)}.entry-wrap{width:min(720px,100%);margin:auto}.code-row{display:grid;grid-template-columns:1fr 120px;gap:10px;margin:20px 0 12px}.code-box{display:flex;align-items:center;justify-content:center;min-height:78px;border:2px solid #cbd8e3;border-radius:14px;background:#fff;font-size:clamp(40px,8vw,64px);font-weight:950;letter-spacing:12px;color:var(--navy);box-shadow:0 8px 24px rgba(18,60,105,.08)}.code-submit{border:0;border-radius:14px;background:#16834a;color:#fff;font-weight:950}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.key{min-height:68px;border:1px solid #116c3c;border-radius:12px;background:#16834a;color:#fff;font-size:27px;font-weight:950;box-shadow:0 3px 10px rgba(22,131,74,.14)}.key:active{transform:scale(.97)}.key.time-key{border:2px solid #16834a;background:#fff;color:#16834a}.key.time-key.active{background:#e9f8ef;color:#116c3c}.key.clear-key{background:#16834a;color:#fff}
#confirmScreen,#lessonScreen,#timeScreen,#messageScreen{align-items:center;justify-content:center;background:var(--paper)}.card{width:min(720px,100%);max-height:calc(100dvh - 32px);overflow:auto;padding:clamp(24px,4vw,38px);border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:0 18px 45px rgba(18,60,105,.11)}.center{text-align:center}.confirm-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}.confirm-btn{min-height:105px;border:0;border-radius:16px;color:#fff;font-size:25px;font-weight:950}.confirm-btn.yes{background:#16834a}.confirm-btn.no{background:var(--danger)}
.timeline{display:grid;gap:8px;margin:20px 0}.step{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:13px;background:#f8fafc}.step-num{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:#e4ebf2;color:var(--muted);font-weight:950}.step strong,.step small{display:block}.step small{margin-top:2px;color:var(--muted);font-weight:700}.step>b{font-size:12px;color:var(--muted)}.step.active{border-color:#efa56d;background:#fff6ed}.step.active .step-num{background:#ef7445;color:#fff}.step.active>b{color:#bd4b21}.step.done{border-color:#99d1ad;background:#f1faf4}.step.done .step-num{background:#16834a;color:#fff}.step.done>b{color:#16834a}.lesson-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.lesson-btn{min-height:106px;padding:12px;border:0;border-radius:15px;color:#fff;box-shadow:0 9px 22px rgba(18,60,105,.14)}.lesson-btn span,.lesson-btn small{display:block}.lesson-btn span{font-size:clamp(25px,4vw,37px);font-weight:950}.lesson-btn small{margin-top:6px;font-weight:800;opacity:.86}.lesson-btn.grammar{background:var(--orange)}.lesson-btn.reading{background:var(--blue)}.lesson-btn.vocab{background:var(--green)}.lesson-btn.finish{grid-column:1/-1;background:var(--navy)}.cancel{display:block;margin:15px auto 0;padding:8px 12px;border:0;background:transparent;color:var(--muted);font-weight:800}
#timeScreen{background:#fff9df}.time-list{display:grid;gap:10px;margin:20px 0}.time-item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:17px;border-left:7px solid var(--navy);border-radius:13px;background:#fff;box-shadow:0 5px 16px rgba(18,60,105,.08)}.time-item.grammar{border-left-color:var(--orange)}.time-item.reading{border-left-color:var(--blue)}.time-item.vocab{border-left-color:var(--green)}.time-item.active{outline:3px solid #ffd45f}.time-item span,.time-item small{display:block}.time-item span{font-size:21px;font-weight:950}.time-item small{margin-top:3px;color:var(--muted);font-weight:700}.time-item strong{font-size:clamp(24px,4vw,36px);color:var(--navy);white-space:nowrap}.total{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:19px;border-radius:14px;background:#654700;color:#fff}.total span{font-weight:900}.total strong{color:#ffe173;font-size:clamp(30px,5vw,47px)}.close{width:100%;min-height:55px;margin-top:11px;border:0;border-radius:12px;background:var(--gold);color:#fff;font-size:18px;font-weight:950}
#messageScreen{color:#fff;text-align:center;background:linear-gradient(145deg,#123c69,#176b87)}#messageScreen.error{background:linear-gradient(145deg,#7f1d1d,#dc2626)}.message-icon{font-size:62px}.message-title{margin:12px 0 4px;font-size:clamp(34px,6vw,58px)}.message-copy{font-size:clamp(19px,3vw,28px);font-weight:800;line-height:1.5}.message-highlight{display:inline-block;margin-top:15px;padding:12px 20px;border-radius:14px;background:#fff;color:var(--navy);font-size:clamp(35px,7vw,65px);font-weight:950}.message-wait{margin-top:22px;opacity:.7}
@media(max-width:620px){.screen{padding:14px}.topline{top:13px;left:15px;right:15px}.card{max-height:calc(100dvh - 20px);padding:20px 16px}.code-row{grid-template-columns:1fr 90px}.key{min-height:58px}.lesson-buttons{grid-template-columns:1fr}.lesson-btn{min-height:72px}}@media(max-height:650px){.entry-wrap .title{font-size:30px}.entry-wrap .copy{font-size:15px}.code-row{margin:10px 0 8px}.code-box{min-height:55px;font-size:38px}.keypad{gap:5px}.key{min-height:45px}.card{padding:15px}.timeline{margin:10px 0}.step{padding:8px}.lesson-btn{min-height:65px}.confirm-btn{min-height:75px}}
</style></head><body>
<section id="entryScreen" class="screen active"><div class="topline"><span class="brand">ThinkUp 2.0</span><span id="clock" class="clock"></span></div><div class="entry-wrap"><p id="entryEyebrow" class="eyebrow">ENGLISH CLASS CHECK</p><h1 id="entryTitle" class="title">개인 코드를 눌러주세요</h1><p id="entryCopy" class="copy">문법·독해·단어 수업을 차례로 기록합니다.</p><div class="code-row"><div id="codeBox" class="code-box">••••</div><button class="code-submit" onclick="submitCode()">확인</button></div><div class="keypad" id="keypad"></div></div></section>
<section id="confirmScreen" class="screen"><div class="card center"><p class="eyebrow">학생 확인</p><h1 id="confirmName" class="title"></h1><p class="copy">본인이 맞나요?</p><div class="confirm-actions"><button class="confirm-btn yes" onclick="confirmStudent()">네, 맞아요</button><button class="confirm-btn no" onclick="resetScreen()">아니요</button></div></div></section>
<section id="lessonScreen" class="screen"><div class="card"><p class="eyebrow">TODAY'S ENGLISH</p><h1 id="lessonName" class="title"></h1><p id="lessonGuide" class="copy"></p><div id="timeline" class="timeline"></div><div id="lessonButtons" class="lesson-buttons"></div><button class="cancel" onclick="resetScreen()">처음 화면으로</button></div></section>
<section id="timeScreen" class="screen"><div class="card"><p class="eyebrow">MY STUDY CLOCK</p><h1 id="timeName" class="title"></h1><p class="copy">지금까지 분야별로 공부한 시간이에요.</p><div id="timeList" class="time-list"></div><div class="total"><span>오늘 총 공부시간</span><strong id="timeTotal">0분</strong></div><button class="close" onclick="resetScreen()">확인했어요</button></div></section>
<section id="messageScreen" class="screen"><div><div id="messageIcon" class="message-icon"></div><h1 id="messageTitle" class="message-title"></h1><div id="messageCopy" class="message-copy"></div><div id="messageHighlight" class="message-highlight"></div><div class="message-wait">잠시 후 처음 화면으로 돌아갑니다.</div></div></section>
<script>
const AREAS=[{id:'grammar',name:'문법'},{id:'reading',name:'독해'},{id:'vocab',name:'단어'}];
let code='',processing=false,timeMode=false,current=null,resetTimer=null;
const $=id=>document.getElementById(id);
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function timeNow(d=new Date()){return d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false})}
function minutesBetween(start,end){if(!start)return 0;const toMin=v=>{const [h,m]=v.split(':').map(Number);return h*60+m};return Math.max(0,toMin(end||timeNow())-toMin(start))}
function duration(n){n=Math.max(0,Number(n)||0);const h=Math.floor(n/60),m=n%60;return h?`${h}시간 ${m}분`:`${m}분`}
function normalize(raw={}){return{areas:raw.englishAreas||{},order:Array.isArray(raw.englishAreaOrder)?raw.englishAreaOrder:[],active:raw.activeEnglishArea||null,finished:Boolean(raw.englishV2Finished)}}
function areaState(state,id){return state.areas[id]||null}
function currentMinutes(item){return item?Number.isFinite(item.durationMinutes)?item.durationMinutes:minutesBetween(item.start,item.end):0}
function totalMinutes(state){return AREAS.reduce((sum,a)=>sum+currentMinutes(areaState(state,a.id)),0)}
function setScreen(id){document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id===id))}
function updateCode(){$('codeBox').textContent=(code+'••••').slice(0,4).split('').join(' ')}
function press(n){if(processing||code.length>=4)return;code+=n;updateCode();if(code.length===4)setTimeout(submitCode,150)}
function erase(){if(processing)return;code=code.slice(0,-1);updateCode()}
function startTimeCheck(){if(processing)return;timeMode=true;code='';updateCode();$('timeCheckButton')?.classList.add('active');$('entryEyebrow').textContent='MY STUDY CLOCK';$('entryTitle').textContent='확인할 코드를 눌러주세요';$('entryCopy').textContent='조회만 하며 수업 기록은 변경하지 않습니다.'}
async function submitCode(){
  if(processing||!/^[0-9]{4}$/.test(code))return;processing=true;
  try{
    const studentDoc=await db.collection('students').doc(code).get();
    if(!studentDoc.exists)throw new Error('등록되지 않은 코드입니다.');
    const ref=db.collection('attendance').doc(today()).collection('students').doc(code);
    const attendDoc=await ref.get(),raw=attendDoc.exists?attendDoc.data():{};
    current={student:studentDoc.data(),code,ref,raw,state:normalize(raw)};
    if(timeMode){renderTime();return}
    $('confirmName').textContent=`${current.student.name} 학생`;setScreen('confirmScreen');
  }catch(e){showMessage('❓','코드를 확인해주세요',e.message,'error')}finally{processing=false}
}
function confirmStudent(){
  if(!current)return;
  if(current.state.finished){showMessage('✅',`${current.student.name} 학생`,'오늘 영어 수업을 모두 마쳤습니다.','',duration(totalMinutes(current.state)),9000);return}
  setScreen('lessonScreen');renderLessons();
}
function renderLessons(){
  const state=current.state;$('lessonName').textContent=`${current.student.name} 학생`;
  $('timeline').innerHTML=AREAS.map((area,i)=>{const item=areaState(state,area.id),status=item?.end?'done':item?'active':'waiting';const detail=!item?'아직 시작 전':item.end?`${item.start} – ${item.end} · ${duration(currentMinutes(item))}`:`${item.start} 시작 · 수업 중`;return `<div class="step ${status}"><span class="step-num">${i+1}</span><div><strong>${area.name}</strong><small>${detail}</small></div><b>${status==='done'?'완료':status==='active'?'진행 중':'대기'}</b></div>`}).join('');
  const available=AREAS.filter(a=>!state.order.includes(a.id));
  if(available.length){$('lessonGuide').textContent=state.active?'현재 수업을 마쳤다면 다음 수업을 선택하세요.':'지금 들어갈 수업을 선택하세요.';$('lessonButtons').innerHTML=available.map(a=>`<button class="lesson-btn ${a.id}" onclick="transition('${a.id}','start')"><span>${a.name}</span><small>${state.active?'다음 수업 시작':'수업 시작'}</small></button>`).join('')}
  else{$('lessonGuide').textContent='세 가지 수업을 모두 들었습니다.';$('lessonButtons').innerHTML=`<button class="lesson-btn finish" onclick="transition('','finish')"><span>오늘 영어 수업 마치기</span><small>마지막 수업 종료 및 총 시간 확인</small></button>`}
}
async function transition(areaId,action){
  if(processing||!current)return;processing=true;document.querySelectorAll('#lessonButtons button').forEach(b=>b.disabled=true);
  try{
    const result=await db.runTransaction(async tx=>{
      const snap=await tx.get(current.ref),raw=snap.exists?snap.data():{},state=normalize(raw);
      if(state.finished)throw new Error('오늘 수업은 이미 완료되었습니다.');
      if(action==='start'&&(!AREAS.some(a=>a.id===areaId)||state.order.includes(areaId)))throw new Error('이미 선택한 수업입니다.');
      if(action==='finish'&&(state.order.length!==3||!state.active))throw new Error('세 수업을 모두 진행한 뒤 마칠 수 있습니다.');
      const now=timeNow(),areas={...state.areas},order=[...state.order];
      if(state.active){const old={...areas[state.active]};old.end=now;old.durationMinutes=minutesBetween(old.start,now);areas[state.active]=old}
      let active=null;if(action==='start'){areas[areaId]={start:now,end:null,durationMinutes:null};order.push(areaId);active=areaId}
      const total=AREAS.reduce((sum,a)=>sum+currentMinutes(areas[a.id]),0);
      const data={studentName:current.student.name,code:current.code,date:today(),englishV2:true,englishAreas:areas,englishAreaOrder:order,activeEnglishArea:active,englishV2Finished:action==='finish',durationMinutes:total,checkOut:action==='finish'?now:null};
      if(!snap.exists||!raw.checkIn)data.checkIn=now;
      tx.set(current.ref,data,{merge:true});return{raw:{...raw,...data},state:normalize(data),now};
    });
    current.raw=result.raw;current.state=result.state;
    if(action==='finish')showMessage('🏁',`${current.student.name} 학생`,'문법·독해·단어 수업을 모두 마쳤습니다.','',duration(totalMinutes(current.state)),9000);
    else{const area=AREAS.find(a=>a.id===areaId);showMessage('✅',`${area.name} 수업 시작`,`${result.now}에 시작했습니다.`,'','',4500)}
  }catch(e){showMessage('⚠️','처리하지 못했습니다',e.message,'error')}finally{processing=false}
}
function renderTime(){
  const state=current.state,now=timeNow();$('timeName').textContent=`${current.student.name} 학생`;
  $('timeList').innerHTML=AREAS.map(area=>{const item=areaState(state,area.id);const mins=item?Number.isFinite(item.durationMinutes)?item.durationMinutes:minutesBetween(item.start,now):0;const label=!item?'아직 시작 전':item.end?`${item.start} – ${item.end} · 완료`:`${item.start}부터 현재까지 · 수업 중`;return `<div class="time-item ${area.id} ${item&&!item.end?'active':''}"><div><span>${area.name}</span><small>${label}</small></div><strong>${duration(mins)}</strong></div>`}).join('');
  $('timeTotal').textContent=duration(totalMinutes(state));setScreen('timeScreen');resetTimer=setTimeout(resetScreen,12000);
}
function showMessage(icon,title,copy,type='',highlight='',delay=5000){setScreen('messageScreen');$('messageScreen').className=`screen active ${type}`;$('messageIcon').textContent=icon;$('messageTitle').textContent=title;$('messageCopy').textContent=copy;$('messageHighlight').textContent=highlight;$('messageHighlight').style.display=highlight?'inline-block':'none';clearTimeout(resetTimer);resetTimer=setTimeout(resetScreen,delay)}
function resetScreen(){clearTimeout(resetTimer);code='';processing=false;timeMode=false;current=null;updateCode();$('timeCheckButton')?.classList.remove('active');$('entryEyebrow').textContent='ENGLISH CLASS CHECK';$('entryTitle').textContent='개인 코드를 눌러주세요';$('entryCopy').textContent='문법·독해·단어 수업을 차례로 기록합니다.';setScreen('entryScreen')}
$('keypad').innerHTML=[
  {label:'1',action:"press('1')"},
  {label:'2',action:"press('2')"},
  {label:'3',action:"press('3')"},
  {label:'4',action:"press('4')"},
  {label:'5',action:"press('5')"},
  {label:'6',action:"press('6')"},
  {label:'7',action:"press('7')"},
  {label:'8',action:"press('8')"},
  {label:'9',action:"press('9')"},
  {label:'시간체크',action:'startTimeCheck()',className:'time-key',id:'timeCheckButton'},
  {label:'0',action:"press('0')"},
  {label:'지움',action:'erase()',className:'clear-key'}
].map(k=>`<button ${k.id?`id="${k.id}"`:''} class="key ${k.className||''}" onclick="${k.action}">${k.label}</button>`).join('');
function tick(){$('clock').textContent=new Date().toLocaleString('ko-KR',{month:'long',day:'numeric',weekday:'long',hour:'2-digit',minute:'2-digit'})}tick();setInterval(tick,1000);updateCode();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(console.warn);
</script></body></html>
