<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ThinkUp 선생님</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; min-height: 100vh; }

    /* ── 로그인 화면 ── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    #loginScreen.hidden { display: none; }
    .login-card {
      background: white; border-radius: 20px;
      padding: 2.5rem 2rem; width: 320px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .login-logo { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .login-title { font-size: 1.2rem; font-weight: 800; color: #1e3a5f; margin-bottom: 0.2rem; }
    .login-sub { font-size: 0.78rem; color: #94a3b8; margin-bottom: 1.8rem; }
    .login-field { margin-bottom: 1rem; text-align: left; }
    .login-field label { display: block; font-size: 0.78rem; font-weight: 700; color: #4a5568; margin-bottom: 0.4rem; }
    .login-field select, .login-field input {
      width: 100%; padding: 11px 13px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 0.95rem; outline: none; background: white;
      transition: border-color 0.2s;
    }
    .login-field input { text-align: center; letter-spacing: 0.3em; font-weight: 700; }
    .login-field select:focus, .login-field input:focus { border-color: #3b82f6; }
    .login-error { color: #ef4444; font-size: 0.8rem; min-height: 1.2rem; margin-bottom: 0.5rem; }
    .btn-login {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      color: white; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    /* ── 헤더 ── */
    .header {
      background: #1e3a5f; color: white;
      padding: 1rem 1.2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-info h1 { font-size: 1.05rem; font-weight: 700; }
    .header-info .sub { font-size: 0.78rem; opacity: 0.65; margin-top: 0.1rem; }
    .header-right { display: flex; gap: 0.5rem; align-items: center; }
    .back-btn, .logout-btn {
      background: rgba(255,255,255,0.15); color: white;
      border: none; border-radius: 8px;
      padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.82rem;
    }
    .back-btn { display: none; }

    /* ── 선생님 선택 화면 ── */
    #selectPage { padding: 1.2rem 1rem; }
    .page-title { font-size: 0.9rem; color: #64748b; margin-bottom: 1rem; }

    .teacher-btn {
      width: 100%; background: white; border: none; border-radius: 14px;
      padding: 1.1rem 1.3rem; margin-bottom: 0.7rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; text-align: left;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .teacher-btn:active { transform: scale(0.99); }
    .t-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #eff6ff; color: #2563eb;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .t-name { font-size: 1rem; font-weight: 700; color: #1e293b; }
    .t-days { font-size: 0.78rem; color: #94a3b8; margin-top: 0.15rem; }
    .no-data { text-align: center; padding: 3rem 1rem; color: #94a3b8; font-size: 0.9rem; }

    /* ── 오늘 날짜 바 ── */
    .today-bar {
      background: white; padding: 0.7rem 1.2rem;
      font-size: 0.84rem; color: #64748b; font-weight: 600;
      border-bottom: 1px solid #f1f5f9;
    }

    /* ── 메인 화면 ── */
    #mainPage { display: none; }
    #tabContent { padding: 1rem; }

    /* ── 오늘 뷰 3섹션 ── */
    .section-title {
      font-size: 0.78rem; font-weight: 700; color: #94a3b8;
      padding: 0.5rem 0 0.6rem; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .section-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: #e2e8f0; color: #64748b;
      border-radius: 10px; padding: 0.05rem 0.5rem;
      font-size: 0.7rem; font-weight: 700;
    }
    .section-badge.in  { background: #d1fae5; color: #059669; }
    .section-badge.out { background: #dbeafe; color: #2563eb; }
    .section-divider { height: 1px; background: #f1f5f9; margin: 0.5rem 0 0.9rem; }

    /* ── 학생 카드 ── */
    .student-card {
      background: white; border-radius: 12px;
      padding: 0.75rem 1.1rem; margin-bottom: 0.55rem;
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,0.05);
      transition: transform 0.1s;
    }
    .student-card:active { transform: scale(0.99); }
    .s-left { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .s-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .av-pending { background: #f1f5f9; color: #64748b; }
    .av-in      { background: #d1fae5; color: #059669; }
    .av-out     { background: #dbeafe; color: #2563eb; }
    .s-name { font-size: 0.93rem; font-weight: 600; color: #1e293b; min-width: 60px; }
    .s-code { font-size: 0.75rem; color: #94a3b8; }
    .s-info { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .s-session {
      display: flex; align-items: center; gap: 0.25rem;
      font-size: 0.8rem; white-space: nowrap;
      background: #f8fafc; border-radius: 6px; padding: 0.2rem 0.5rem;
    }
    .s-session .t-in  { font-weight: 700; color: #059669; }
    .s-session .t-arrow { color: #cbd5e0; font-size: 0.7rem; }
    .s-session .t-out { font-weight: 700; color: #2563eb; }
    .s-session .t-out.ongoing { color: #94a3b8; font-style: italic; }
    .s-divider { color: #e2e8f0; font-size: 0.8rem; }
    .s-total {
      display: flex; align-items: center; gap: 0.25rem;
      font-size: 0.8rem; white-space: nowrap; padding: 0.2rem 0.5rem;
      border-radius: 6px; font-weight: 700;
    }
    .s-total.studying { background: #dcfce7; color: #059669; }
    .s-total.done     { background: #dbeafe; color: #2563eb; }
    .s-total.short    { background: #fee2e2; color: #ef4444; }

    .empty-msg { text-align: center; padding: 1.5rem 1rem; color: #94a3b8; font-size: 0.88rem; }
    .off-day { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
    .off-day .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* ── 상세 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: flex-end; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px 20px 0 0;
      padding: 1.5rem; width: 100%; max-width: 500px;
    }
    .modal-handle { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 1.2rem; }
    .modal-name { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 1.2rem; }
    .modal-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #f1f5f9; }
    .modal-row:last-of-type { border: none; }
    .modal-label { color: #64748b; font-size: 0.88rem; }
    .modal-val { font-weight: 600; font-size: 0.88rem; color: #1e293b; }
    .modal-close {
      width: 100%; margin-top: 1rem; padding: 0.85rem;
      background: #f1f5f9; border: none; border-radius: 10px;
      font-size: 0.92rem; color: #64748b; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">👨‍🏫</div>
    <div class="login-title">ThinkUp 선생님</div>
    <p class="login-sub">과목을 선택하고 비밀번호를 입력하세요</p>
    <div class="login-field">
      <label>과목 선택</label>
      <select id="subjectSelect" onchange="onSubjectChange()">
        <option value="">과목을 선택하세요</option>
      </select>
    </div>
    <div class="login-field" id="pwField" style="display:none; animation:fadeIn 0.25s ease;">
      <label id="pwLabel">비밀번호</label>
      <input type="password" id="codeInput" placeholder="• • • •" maxlength="4"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()" style="display:none">입장하기</button>
  </div>
</div>

<!-- ── 헤더 ── -->
<div class="header">
  <div class="header-info">
    <h1 id="headerTitle">ThinkUp 선생님</h1>
    <div class="sub" id="headerSub"></div>
  </div>
  <div class="header-right">
    <button class="back-btn" id="backBtn" onclick="goBack()">← 선생님 선택</button>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- ── 선생님 선택 ── -->
<div id="selectPage">
  <div style="padding:1.2rem 1rem 0">
    <p class="page-title" id="selectTitle">선생님을 선택하세요</p>
  </div>
  <div style="padding:0 1rem" id="teacherList">
    <div class="no-data">불러오는 중...</div>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div id="mainPage">
  <div class="today-bar" id="todayBar"></div>
  <div id="tabContent"></div>
</div>

<!-- ── 모달 ── -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-row"><span class="modal-label">코드</span><span class="modal-val" id="mCode"></span></div>
    <div id="mSessions"></div>
    <div class="modal-row"><span class="modal-label">총 공부 시간</span><span class="modal-val" id="mDur"></span></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
// ── 과목 정의 (admin/timetable.html과 동일) ─────────────────────────────────
const SUBJECTS = [
  {key:'korean',  name:'국어', code:'1111', teachers:['설쌤','철원쌤','소진쌤']},
  {key:'english', name:'영어', code:'2222', teachers:['주민쌤','문쌤','박쌤','경미쌤','오쌤']},
  {key:'math',    name:'수학', code:'3333', teachers:['강쌤','민규쌤','의현쌤']},
  {key:'science', name:'과학', code:'4444', teachers:['선엽쌤','신쌤']},
  {key:'history', name:'역사', code:'5555', teachers:['역사1','역사2','역사3','역사4']},
];

const DAY_CODES  = ['mon','tue','wed','thu','fri','sat'];
const DAY_KR     = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토'};
const DAY_LABEL  = {mon:'월요일',tue:'화요일',wed:'수요일',thu:'목요일',fri:'금요일',sat:'토요일'};
const JS_DAY_MAP = ['sun','mon','tue','wed','thu','fri','sat'];

const now        = new Date();
const todayCode  = JS_DAY_MAP[now.getDay()];
const todayStr   = now.toISOString().split('T')[0];
const dateLabel  = `${now.getMonth()+1}월 ${now.getDate()}일 (${DAY_KR[todayCode] || ''}요일)`;

// ── 상태 ─────────────────────────────────────────────────────────────────────
let currentSubject = null;
let currentTeacher = null;
let allSchedule    = {};
let attendanceData = {};
let unsubscribe    = null;

document.getElementById('headerSub').textContent = dateLabel;

// ── 과목 드롭다운 채우기 ─────────────────────────────────────────────────────
document.getElementById('subjectSelect').innerHTML =
  '<option value="">과목을 선택하세요</option>' +
  SUBJECTS.map(s => `<option value="${s.name}">${s.name}</option>`).join('');

// ── 로그인 ────────────────────────────────────────────────────────────────────
function onSubjectChange() {
  const sel = document.getElementById('subjectSelect').value;
  const pw  = document.getElementById('pwField');
  const btn = document.getElementById('loginBtn');
  const inp = document.getElementById('codeInput');
  if (sel) {
    document.getElementById('pwLabel').textContent = sel + ' 비밀번호';
    pw.style.display = 'block';
    btn.style.display = 'block';
    inp.value = '';
    document.getElementById('loginError').textContent = '';
    setTimeout(() => inp.focus(), 50);
  } else {
    pw.style.display = 'none';
    btn.style.display = 'none';
  }
}

function doLogin() {
  const selName = document.getElementById('subjectSelect').value;
  const pw      = document.getElementById('codeInput').value.trim();
  if (!selName) { document.getElementById('loginError').textContent = '과목을 선택해주세요.'; return; }
  const sub = SUBJECTS.find(s => s.name === selName);
  if (!sub || pw !== sub.code) {
    document.getElementById('loginError').textContent = '코드가 맞지 않습니다.';
    return;
  }
  currentSubject = sub;
  sessionStorage.setItem('thinkup_teacher_subject', sub.key);
  document.getElementById('loginScreen').classList.add('hidden');
  loadSchedulesAndShow();
}

function doLogout() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  sessionStorage.removeItem('thinkup_teacher_subject');
  currentSubject = null;
  currentTeacher = null;
  allSchedule    = {};
  attendanceData = {};
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'ThinkUp 선생님';
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('selectPage').style.display = 'block';
  document.getElementById('teacherList').innerHTML = '<div class="no-data">불러오는 중...</div>';
  document.getElementById('subjectSelect').value = '';
  document.getElementById('pwField').style.display = 'none';
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('codeInput').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ── 세션 복원 ─────────────────────────────────────────────────────────────────
(function resumeSession() {
  const key = sessionStorage.getItem('thinkup_teacher_subject');
  if (!key) return;
  const sub = SUBJECTS.find(s => s.key === key);
  if (!sub) return;
  currentSubject = sub;
  document.getElementById('subjectSelect').value = sub.name;
  onSubjectChange();
  document.getElementById('codeInput').value = sub.code;
  document.getElementById('loginScreen').classList.add('hidden');
  loadSchedulesAndShow();
})();

// ── 스케줄 로드 ───────────────────────────────────────────────────────────────
async function loadSchedulesAndShow() {
  try {
    for (const dc of DAY_CODES) {
      const doc = await db.collection('schedules').doc(dc).get();
      if (doc.exists) allSchedule[dc] = doc.data();
    }
  } catch(e) {
    document.getElementById('teacherList').innerHTML =
      `<div class="no-data" style="color:#ef4444">오류: ${e.message}</div>`;
    return;
  }
  renderTeacherList();
}

// ── 선생님 목록 렌더 (과목 필터) ─────────────────────────────────────────────
function renderTeacherList() {
  document.getElementById('selectTitle').textContent =
    `${currentSubject.name} 선생님을 선택하세요`;

  const list = document.getElementById('teacherList');
  list.innerHTML = '';

  currentSubject.teachers.forEach(name => {
    // 오늘 담당 학생 수 계산
    const todaySlots = (allSchedule[todayCode]?.teachers || []).filter(t => t.name === name);
    const todayCount = new Set(todaySlots.flatMap(t => (t.students||[]).map(s=>s.code))).size;

    const btn = document.createElement('button');
    btn.className = 'teacher-btn';
    btn.innerHTML = `
      <div class="t-avatar">👨‍🏫</div>
      <div>
        <div class="t-name">${name} 선생님</div>
        <div class="t-days">오늘 담당 ${todayCount}명</div>
      </div>
    `;
    btn.onclick = () => selectTeacher(name);
    list.appendChild(btn);
  });
}

// ── 선생님 선택 ───────────────────────────────────────────────────────────────
function selectTeacher(name) {
  currentTeacher = name;
  document.getElementById('headerTitle').textContent = `${name} 선생님`;
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('selectPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'block';
  document.getElementById('todayBar').textContent =
    `📅 ${now.getMonth()+1}월 ${now.getDate()}일 (${DAY_KR[todayCode] || ''}요일) · 오늘 수업`;
  loadTodayContent();
}

// ── 뒤로가기 ─────────────────────────────────────────────────────────────────
function goBack() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  currentTeacher = null;
  attendanceData = {};
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'ThinkUp 선생님';
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('selectPage').style.display = 'block';
}

// ── 오늘 수업 콘텐츠 로드 ─────────────────────────────────────────────────────
function loadTodayContent() {
  const dayData = allSchedule[todayCode];
  const teacherSlots = (dayData?.teachers || []).filter(t => t.name === currentTeacher);
  const studentMap = new Map();
  teacherSlots.flatMap(t => t.students || []).forEach(s => {
    if (s.code && !studentMap.has(s.code)) studentMap.set(s.code, s);
  });
  const students = [...studentMap.values()];

  if (!students.length) {
    document.getElementById('tabContent').innerHTML =
      `<div class="off-day"><div class="icon">📅</div>오늘은 수업이 없습니다.</div>`;
    return;
  }

  document.getElementById('tabContent').innerHTML = '<div id="allSections"></div>';
  renderAllSections(students);
  startAttendanceListener(students);
}

// ── 헬퍼 ─────────────────────────────────────────────────────────────────────
function fmt(min) {
  if (!min && min !== 0) return '-';
  const h = Math.floor(min/60), m = min%60;
  return h ? (m ? `${h}시간 ${m}분` : `${h}시간`) : `${m}분`;
}

function getSessions(att) {
  if (!att) return [];
  if (att.sessions && att.sessions.length > 0) return att.sessions;
  if (!att.checkIn) return [];
  return [{ checkIn: att.checkIn, checkOut: att.checkOut || null, durationMinutes: att.durationMinutes || null }];
}

function renderSessionsHTML(sessions) {
  return sessions.map((s, i) => `
    <div class="s-session">
      <span class="t-in">${s.checkIn}</span>
      <span class="t-arrow">→</span>
      <span class="t-out${s.checkOut ? '' : ' ongoing'}">${s.checkOut || '공부 중'}</span>
    </div>${i < sessions.length - 1 ? '<span class="s-divider">/</span>' : ''}`
  ).join('');
}

function renderCard(s, avatarClass) {
  const sessions = getSessions(s.att);
  const lastSession = sessions[sessions.length - 1];
  const isOngoing = lastSession && !lastSession.checkOut;
  const totalMin = s.att?.durationMinutes;
  const short = !isOngoing && totalMin != null && totalMin < 90;
  const totalClass = isOngoing ? 'studying' : (short ? 'short' : 'done');
  const totalLabel = isOngoing ? '공부 중' : fmt(totalMin);
  return `
    <div class="student-card" onclick="showModal('${s.code}','${s.name}')">
      <div class="s-left">
        <div class="s-avatar ${avatarClass}">${s.name[0]}</div>
        <div class="s-name">${s.name}</div>
      </div>
      <div class="s-info">
        ${sessions.length ? renderSessionsHTML(sessions) : ''}
        ${sessions.length ? `<div class="s-total ${totalClass}">${totalLabel}</div>` : ''}
      </div>
    </div>`;
}

// ── 3섹션 렌더 ────────────────────────────────────────────────────────────────
function renderAllSections(allStudents) {
  const el = document.getElementById('allSections');
  if (!el) return;

  const pending = [], checkedIn = [], checkedOut = [];
  allStudents.forEach(s => {
    const sessions = getSessions(attendanceData[s.code]);
    const last = sessions[sessions.length - 1];
    const att = attendanceData[s.code];
    if (!last)                    pending.push({...s, att});
    else if (!last.checkOut)      checkedIn.push({...s, att});
    else                          checkedOut.push({...s, att});
  });

  const cardPending = pending.map(s => `
    <div class="student-card" onclick="showModal('${s.code}','${s.name}')">
      <div class="s-left">
        <div class="s-avatar av-pending">${s.name[0]}</div>
        <div class="s-name">${s.name}</div>
      </div>
    </div>`).join('') || '<div class="empty-msg">모든 학생이 입실했습니다 ✅</div>';

  const cardIn  = checkedIn.map(s  => renderCard(s,  'av-in')).join('')  || '<div class="empty-msg">입실한 학생이 없습니다</div>';
  const cardOut = checkedOut.map(s => renderCard(s, 'av-out')).join('') || '<div class="empty-msg">퇴실한 학생이 없습니다</div>';

  el.innerHTML = `
    <div class="section-title">수업할 학생 <span class="section-badge">${pending.length}</span></div>
    ${cardPending}
    <div class="section-divider"></div>
    <div class="section-title">입실 <span class="section-badge in">${checkedIn.length}</span></div>
    ${cardIn}
    <div class="section-divider"></div>
    <div class="section-title">퇴실 <span class="section-badge out">${checkedOut.length}</span></div>
    ${cardOut}
  `;
}

// ── 실시간 출결 감지 ──────────────────────────────────────────────────────────
function startAttendanceListener(students) {
  if (unsubscribe) unsubscribe();
  attendanceData = {};
  unsubscribe = db.collection('attendance').doc(todayStr)
    .collection('students')
    .onSnapshot(snap => {
      snap.forEach(doc => { attendanceData[doc.id] = doc.data(); });
      renderAllSections(students);
    });
}

// ── 모달 ─────────────────────────────────────────────────────────────────────
function showModal(code, name) {
  const att = attendanceData[code];
  const sessions = getSessions(att);
  document.getElementById('modalName').textContent = name + ' 학생';
  document.getElementById('mCode').textContent = code;
  document.getElementById('mSessions').innerHTML = sessions.map((s, i) => `
    <div class="modal-row">
      <span class="modal-label">${sessions.length > 1 ? `입실 ${i+1}회` : '입실/퇴실'}</span>
      <span class="modal-val">${s.checkIn}${s.checkOut ? ' → ' + s.checkOut : ' → 공부 중'}</span>
    </div>`).join('') || '<div class="modal-row"><span class="modal-label">입실/퇴실</span><span class="modal-val">-</span></div>';
  document.getElementById('mDur').textContent = att?.durationMinutes != null ? fmt(att.durationMinutes) : (sessions.length ? '공부 중' : '-');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
